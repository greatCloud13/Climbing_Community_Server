name: ClimbingWith CI/CD

on:
  push:
    branches: ["main", "production"]
  pull_request:
    branches: ["main", "production"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      vector:
        image: redis/redis-stack-server
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test

  # production 브랜치로 push될 때만 이미지 빌드
  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Docker build & push
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/climbingwith-app .
          docker push ${{ secrets.DOCKER_USERNAME }}/climbingwith-app

  # production 브랜치로 push될 때만 EC2 배포
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/app"

      - name: EC2 Docker Run
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          envs: DB_PASSWORD,RABBITMQ_PASSWORD,JWT_SECRET,DOCKER_USERNAME
          script: |
            cd ~/app
            cat > .env <<EOF
            DB_PASSWORD=${DB_PASSWORD}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            DOCKER_USERNAME=${DOCKER_USERNAME}
            EOF
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/climbingwith-app
            sudo docker-compose -f docker-compose.prod.yml down || true
            sudo docker-compose -f docker-compose.prod.yml up -d
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
