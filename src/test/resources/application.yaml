server:
  port: 8080

spring:
  application:
    name: ClimbingWith

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:climbing_db;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  # TODO: [PRODUCTION] 환경변수로 변경 필요
  secret: your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration: 3600000  # 1시간

file:
  upload-dir: /home/ubuntu/upload_files/