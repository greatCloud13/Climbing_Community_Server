version: '3.8'

services:
  # 1. db Container
  db:
    image: mysql:8.0
    container_name: climbingwith-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: p@ssword
      MYSQL_DATABASE: climbingWith
    networks:
      - climbing-network
    volumes:
      - ./db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 5s
      retries: 10
      interval: 5s

  # 2. spring boot app Container
  app:
    build: .
    container_name: climbingwith-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/climbingWith?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: p@ssword
    networks:
      - climbing-network
    depends_on:
      db:
        condition: service_healthy # DB의 healthcheck가 통과될 때까지 대기

networks:
  climbing-network:
    driver: bridge